<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartList - Sua Lista de Compras</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8fafc;
        }
        .item-card {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .checked {
            background-color: #f1f5f9;
            border-color: #e2e8f0;
        }
        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        .tab-active {
            color: #10b981;
            border-bottom: 2px solid #10b981;
        }
        /* Custom scrollbar for table */
        .table-container::-webkit-scrollbar {
            height: 6px;
        }
        .table-container::-webkit-scrollbar-thumb {
            background: #e2e8f0;
            border-radius: 10px;
        }
    </style>
</head>
<body class="min-h-screen pb-24">

    <div class="max-w-2xl mx-auto px-4 py-6">
        <!-- Header -->
        <header class="mb-6 text-center">
            <h1 class="text-3xl font-bold text-slate-800">SmartList</h1>
            <p class="text-slate-500 text-sm italic">Organize suas compras com precisão</p>
        </header>

        <!-- Navigation Tabs -->
        <div class="flex border-b border-slate-200 mb-6">
            <button onclick="switchTab('list')" id="tab-list" class="flex-1 py-3 text-sm font-semibold text-slate-500 transition-all tab-active">
                Lista de Itens
            </button>
            <button onclick="switchTab('table')" id="tab-table" class="flex-1 py-3 text-sm font-semibold text-slate-500 transition-all">
                Visão Planilha
            </button>
        </div>

        <!-- View 1: List View -->
        <div id="view-list">
            <!-- Input Area -->
            <div class="bg-white rounded-2xl shadow-sm border border-slate-200 p-4 mb-6">
                <form id="add-form" class="flex gap-2">
                    <input 
                        type="text" 
                        id="item-input" 
                        placeholder="Adicionar novo produto..." 
                        class="flex-1 bg-slate-50 border-none focus:ring-2 focus:ring-emerald-500 rounded-xl px-4 py-3 text-slate-700 outline-none transition-all"
                        required
                    >
                    <button 
                        type="submit" 
                        class="bg-emerald-500 hover:bg-emerald-600 text-white p-3 rounded-xl transition-colors shadow-lg shadow-emerald-200"
                    >
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                    </button>
                </form>
            </div>

            <div id="shopping-list" class="space-y-3">
                <!-- Items list -->
            </div>
        </div>

        <!-- View 2: Table View -->
        <div id="view-table" class="hidden">
            <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
                <div class="table-container overflow-x-auto">
                    <table class="w-full text-left border-collapse">
                        <thead>
                            <tr class="bg-slate-50 border-b border-slate-200">
                                <th class="px-4 py-3 text-xs font-bold text-slate-400 uppercase tracking-wider">Status</th>
                                <th class="px-4 py-3 text-xs font-bold text-slate-400 uppercase tracking-wider">Item</th>
                                <th class="px-4 py-3 text-xs font-bold text-slate-400 uppercase tracking-wider text-right">Preço</th>
                                <th class="px-4 py-3 text-xs font-bold text-slate-400 uppercase tracking-wider text-center">Qtd</th>
                                <th class="px-4 py-3 text-xs font-bold text-slate-400 uppercase tracking-wider text-right">Total</th>
                            </tr>
                        </thead>
                        <tbody id="table-body" class="divide-y divide-slate-100">
                            <!-- Table rows -->
                        </tbody>
                        <tfoot>
                            <tr class="bg-slate-50 font-bold">
                                <td colspan="4" class="px-4 py-4 text-sm text-slate-600 text-right">Total Geral:</td>
                                <td id="table-grand-total" class="px-4 py-4 text-sm text-emerald-600 text-right font-bold">R$ 0,00</td>
                            </tr>
                        </tfoot>
                    </table>
                </div>
            </div>
        </div>

        <!-- Empty State -->
        <div id="empty-state" class="text-center py-12 hidden">
            <div class="bg-slate-100 w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-4 text-slate-400">
                <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="21" r="1"></circle><circle cx="20" cy="21" r="1"></circle><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path></svg>
            </div>
            <p class="text-slate-500">Sua lista está limpa.</p>
        </div>
    </div>

    <!-- Sticky Total Bar -->
    <div class="fixed bottom-0 left-0 right-0 bg-white border-t border-slate-200 p-4 shadow-[0_-4px_10px_rgba(0,0,0,0.03)] z-50">
        <div class="max-w-2xl mx-auto flex justify-between items-center">
            <div>
                <p class="text-[10px] text-slate-400 uppercase font-bold tracking-widest mb-0.5">No Carrinho</p>
                <p class="text-2xl font-bold text-slate-800" id="grand-total-footer">R$ 0,00</p>
            </div>
            <button onclick="clearAll()" class="text-xs font-semibold text-red-500 hover:bg-red-50 border border-transparent hover:border-red-100 px-4 py-2 rounded-xl transition-all">
                Resetar Lista
            </button>
        </div>
    </div>

    <script>
        let items = JSON.parse(localStorage.getItem('smartlist_data')) || [];
        let currentTab = 'list';

        const addForm = document.getElementById('add-form');
        const itemInput = document.getElementById('item-input');
        const listContainer = document.getElementById('shopping-list');
        const tableBody = document.getElementById('table-body');
        const emptyState = document.getElementById('empty-state');
        const grandTotalFooter = document.getElementById('grand-total-footer');
        const tableGrandTotal = document.getElementById('table-grand-total');

        // Função principal de ordenação inteligente
        function sortItems() {
            items.sort((a, b) => {
                // 1º Critério: Checked status (falso vem antes de verdadeiro)
                if (a.checked !== b.checked) {
                    return a.checked ? 1 : -1;
                }
                // 2º Critério: Ordem alfabética (dentro dos grupos)
                return a.name.localeCompare(b.name, 'pt-BR', { sensitivity: 'base' });
            });
        }

        function saveToStorage() {
            sortItems();
            localStorage.setItem('smartlist_data', JSON.stringify(items));
            render();
        }

        function switchTab(tab) {
            currentTab = tab;
            const viewList = document.getElementById('view-list');
            const viewTable = document.getElementById('view-table');
            const tabListBtn = document.getElementById('tab-list');
            const tabTableBtn = document.getElementById('tab-table');

            if (tab === 'list') {
                viewList.classList.remove('hidden');
                viewTable.classList.add('hidden');
                tabListBtn.classList.add('tab-active');
                tabTableBtn.classList.remove('tab-active');
            } else {
                viewList.classList.add('hidden');
                viewTable.classList.remove('hidden');
                tabListBtn.classList.remove('tab-active');
                tabTableBtn.classList.add('tab-active');
                renderTable();
            }
        }

        addForm.addEventListener('submit', (e) => {
            e.preventDefault();
            const name = itemInput.value.trim();
            if (name) {
                const newItem = {
                    id: Date.now(),
                    name: name,
                    price: 0,
                    quantity: 1,
                    checked: false
                };
                items.push(newItem);
                itemInput.value = '';
                saveToStorage();
            }
        });

        function removeItem(id) {
            items = items.filter(item => item.id !== id);
            saveToStorage();
        }

        function toggleItem(id) {
            const index = items.findIndex(item => item.id === id);
            items[index].checked = !items[index].checked;
            saveToStorage();
        }

        function updatePrice(id, val) {
            const index = items.findIndex(item => item.id === id);
            items[index].price = parseFloat(val) || 0;
            updateTotals();
            localStorage.setItem('smartlist_data', JSON.stringify(items));
            if (currentTab === 'table') renderTable();
        }

        function updateQty(id, val) {
            const index = items.findIndex(item => item.id === id);
            items[index].quantity = parseInt(val) || 0;
            updateTotals();
            localStorage.setItem('smartlist_data', JSON.stringify(items));
            if (currentTab === 'table') renderTable();
        }

        function updateTotals() {
            const cartTotal = items.reduce((acc, item) => {
                return item.checked ? acc + (item.price * item.quantity) : acc;
            }, 0);
            
            const totalGeral = items.reduce((acc, item) => {
                return acc + (item.price * item.quantity);
            }, 0);

            grandTotalFooter.innerText = `R$ ${cartTotal.toLocaleString('pt-BR', { minimumFractionDigits: 2 })}`;
            if (tableGrandTotal) tableGrandTotal.innerText = `R$ ${totalGeral.toLocaleString('pt-BR', { minimumFractionDigits: 2 })}`;
        }

        function clearAll() {
            if (confirm('Deseja apagar todos os itens da lista?')) {
                items = [];
                saveToStorage();
            }
        }

        function renderTable() {
            tableBody.innerHTML = '';
            items.forEach(item => {
                const tr = document.createElement('tr');
                tr.className = "hover:bg-slate-50 transition-colors";
                tr.innerHTML = `
                    <td class="px-4 py-3 text-center">
                        <span class="inline-block w-2 h-2 rounded-full ${item.checked ? 'bg-emerald-500' : 'bg-slate-300'}"></span>
                    </td>
                    <td class="px-4 py-3 text-sm text-slate-700 font-medium ${item.checked ? 'text-slate-400 italic' : ''}">${item.name}</td>
                    <td class="px-4 py-3 text-sm text-slate-600 text-right">R$ ${item.price.toLocaleString('pt-BR', {minimumFractionDigits: 2})}</td>
                    <td class="px-4 py-3 text-sm text-slate-600 text-center">${item.quantity}</td>
                    <td class="px-4 py-3 text-sm font-bold text-slate-800 text-right">R$ ${(item.price * item.quantity).toLocaleString('pt-BR', {minimumFractionDigits: 2})}</td>
                `;
                tableBody.appendChild(tr);
            });
            updateTotals();
        }

        function render() {
            if (items.length === 0) {
                listContainer.innerHTML = '';
                emptyState.classList.remove('hidden');
                updateTotals();
                if (currentTab === 'table') renderTable();
                return;
            }

            emptyState.classList.add('hidden');
            listContainer.innerHTML = '';

            items.forEach(item => {
                const card = document.createElement('div');
                card.className = `item-card group flex flex-col bg-white border border-slate-200 rounded-2xl p-4 shadow-sm ${item.checked ? 'checked' : ''}`;
                
                let content = `
                    <div class="flex items-center gap-3">
                        <button onclick="toggleItem(${item.id})" class="w-6 h-6 rounded-full border-2 flex items-center justify-center transition-all ${item.checked ? 'bg-emerald-500 border-emerald-500 text-white' : 'border-slate-300'}">
                            ${item.checked ? '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>' : ''}
                        </button>
                        <span class="flex-1 text-slate-700 font-medium ${item.checked ? 'line-through text-slate-400' : ''}">${item.name}</span>
                        <button onclick="removeItem(${item.id})" class="opacity-0 group-hover:opacity-100 text-slate-300 hover:text-red-500 transition-all">
                            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
                        </button>
                    </div>
                `;

                if (item.checked) {
                    content += `
                        <div class="flex items-center gap-4 mt-4 pt-4 border-t border-slate-200/60">
                            <div class="flex-1">
                                <label class="text-[10px] text-slate-400 font-bold uppercase block mb-1">Preço Unit.</label>
                                <div class="relative">
                                    <span class="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-sm">R$</span>
                                    <input 
                                        type="number" 
                                        step="0.01" 
                                        value="${item.price || ''}" 
                                        oninput="updatePrice(${item.id}, this.value)"
                                        class="w-full bg-white border border-slate-200 rounded-lg pl-9 pr-3 py-2 text-sm outline-none focus:ring-2 focus:ring-emerald-500/20 focus:border-emerald-500"
                                        placeholder="0,00"
                                    >
                                </div>
                            </div>
                            <div class="w-20 text-center">
                                <label class="text-[10px] text-slate-400 font-bold uppercase block mb-1">Qtd</label>
                                <input 
                                    type="number" 
                                    value="${item.quantity}" 
                                    oninput="updateQty(${item.id}, this.value)"
                                    class="w-full text-center py-2 text-sm outline-none font-medium border border-slate-200 rounded-lg"
                                    min="1"
                                >
                            </div>
                            <div class="text-right min-w-[70px]">
                                <label class="text-[10px] text-slate-400 font-bold uppercase block mb-1">Subtotal</label>
                                <span class="text-sm font-bold text-slate-700">R$ ${(item.price * item.quantity).toLocaleString('pt-BR', {minimumFractionDigits: 2})}</span>
                            </div>
                        </div>
                    `;
                }

                card.innerHTML = content;
                listContainer.appendChild(card);
            });
            updateTotals();
            if (currentTab === 'table') renderTable();
        }

        // Inicializa com ordenação
        sortItems();
        render();
    </script>
</body>
</html>
